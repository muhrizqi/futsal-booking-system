<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Lapangan Futsal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            animation: slideDown 0.6s ease;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        @keyframes slideDown {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .venues-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .venue-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .venue-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.15);
        }

        .venue-card h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.3em;
        }

        .venue-card p {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
            text-decoration: none;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-whatsapp {
            background: #25d366;
            color: white;
        }

        .btn-whatsapp:hover {
            background: #1fb856;
        }

        .schedule-container {
            display: none;
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            animation: fadeIn 0.3s ease;
        }

        .schedule-container.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .schedule-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .schedule-header h2 {
            color: #667eea;
        }

        .btn-back {
            background: #999;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
        }

        .date-picker {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .date-picker input {
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 0.9em;
        }

        .date-picker button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
        }

        .courts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .court-card {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            overflow-x: auto;
        }

        .court-card h4 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .time-slots {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .time-slot {
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 0.8em;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid #ddd;
            background: white;
        }

        .time-slot.available {
            border-color: #4caf50;
            color: #4caf50;
            cursor: pointer;
        }

        .time-slot.available:hover {
            background: #4caf50;
            color: white;
        }

        .time-slot.booked {
            background: #f44336;
            color: white;
            border-color: #f44336;
            cursor: not-allowed;
        }

        .time-slot.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .pricing-info {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 4px;
            margin-top: 15px;
            font-size: 0.9em;
        }

        .pricing-info h5 {
            color: #667eea;
            margin-bottom: 8px;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            color: #555;
        }

        .booking-form {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .booking-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.9em;
            font-family: inherit;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .alert {
            padding: 12px 15px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 0.9em;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .footer {
            text-align: center;
            color: white;
            font-size: 0.9em;
            margin-top: 30px;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .courts-grid {
                grid-template-columns: 1fr;
            }

            .schedule-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .time-slots {
                flex-direction: column;
            }

            .time-slot {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚽ Booking Lapangan Futsal</h1>
            <p>Pesan lapangan favorit Anda dengan mudah</p>
        </div>

        <div id="venueList" class="venues-grid"></div>

        <div id="scheduleContainer" class="schedule-container">
            <div class="schedule-header">
                <h2 id="venueName"></h2>
                <button class="btn-back" onclick="backToVenues()">← Kembali</button>
            </div>

            <div class="date-picker">
                <input type="date" id="datePicker" />
                <button onclick="loadSchedule()">Lihat Jadwal</button>
            </div>

            <div id="scheduleContent" class="loading">
                <div class="spinner"></div>
                <p>Memuat jadwal...</p>
            </div>

            <div id="bookingForm" class="booking-form">
                <h3 style="margin-bottom: 15px; color: #667eea;">Detail Pemesanan</h3>
                <div class="form-group">
                    <label>Nama Anda</label>
                    <input type="text" id="customerName" placeholder="Masukkan nama Anda" required>
                </div>
                <div class="form-group">
                    <label>Nomor WhatsApp</label>
                    <input type="tel" id="customerPhone" placeholder="Contoh: 08123456789" required>
                </div>
                <div class="form-group">
                    <label>Catatan (Opsional)</label>
                    <textarea id="notes" placeholder="Catatan tambahan..." rows="3"></textarea>
                </div>
                <div id="bookingInfo" style="background: #e8f5e9; padding: 12px; border-radius: 4px; margin-bottom: 15px; display: none;">
                    <strong id="bookingSummary"></strong>
                </div>
                <div class="form-actions">
                    <button class="btn btn-whatsapp" onclick="submitBooking()" style="flex: 1;">
                        🟢 Hubungi Admin via WhatsApp
                    </button>
                    <button class="btn" style="background: #999; color: white; flex: 1;" onclick="cancelBooking()">
                        Batal
                    </button>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>© 2024 Futsal Booking System | Hubungi kami untuk bantuan</p>
        </div>
    </div>

    <script>
        let selectedVenue = null;
        let selectedCourt = null;
        let selectedDate = null;
        let selectedTime = null;
        let selectedEndTime = null;
        let whatsappAdmin = null;
        let venueName = null;

        // Load daftar venue
        async function loadVenues() {
            try {
                const response = await fetch('/api/venues');
                const venues = await response.json();
                
                const venueList = document.getElementById('venueList');
                venueList.innerHTML = venues.map(venue => `
                    <div class="venue-card">
                        <h3>${venue.name}</h3>
                        <p>📍 ${venue.location}</p>
                        <button class="btn btn-primary" onclick="selectVenue(${venue.id}, '${venue.name}')">
                            Lihat Jadwal
                        </button>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading venues:', error);
            }
        }

        function selectVenue(venueId, name) {
            selectedVenue = venueId;
            venueName = name;
            document.getElementById('venueName').textContent = name;
            document.getElementById('scheduleContainer').classList.add('active');
            
            // Set tanggal default ke hari ini
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('datePicker').value = today;
            
            loadSchedule();
        }

        function backToVenues() {
            document.getElementById('scheduleContainer').classList.remove('active');
            document.getElementById('bookingForm').classList.remove('active');
            selectedVenue = null;
            selectedCourt = null;
            selectedTime = null;
        }

        async function loadSchedule() {
            selectedDate = document.getElementById('datePicker').value;
            if (!selectedDate) {
                alert('Pilih tanggal terlebih dahulu');
                return;
            }

            const scheduleContent = document.getElementById('scheduleContent');
            scheduleContent.innerHTML = '<div class="loading"><div class="spinner"></div><p>Memuat jadwal...</p></div>';

            try {
                // Load pricing
                const pricingRes = await fetch(`/api/pricing/${selectedVenue}`);
                const pricing = await pricingRes.json();

                // Load schedule
                const scheduleRes = await fetch(`/api/schedule/${selectedVenue}/${selectedDate}`);
                const bookings = await scheduleRes.json();

                // Group by court
                const courtData = {};
                bookings.forEach(b => {
                    if (!courtData[b.court_id]) {
                        courtData[b.court_id] = {
                            id: b.court_id,
                            name: b.court_name,
                            color: b.color,
                            bookings: []
                        };
                    }
                    courtData[b.court_id].bookings.push(b);
                });

                // Generate time slots (06:00 - 24:00)
                const timeSlots = generateTimeSlots();

                let html = '<div class="courts-grid">';
                
                Object.values(courtData).forEach(court => {
                    html += `
                        <div class="court-card">
                            <h4>🎯 ${court.name} <span style="color: #999; font-size: 0.8em;">(${court.color})</span></h4>
                            <div class="time-slots" id="court-${court.id}">
                    `;

                    timeSlots.forEach(slot => {
                        const isBooked = court.bookings.some(b => 
                            b.start_time && b.start_time.substring(0, 5) === slot
                        );

                        html += `
                            <div class="time-slot ${isBooked ? 'booked' : 'available'}" 
                                 onclick="${!isBooked ? `selectTimeSlot(${court.id}, '${slot}')` : ''}"
                                 title="${isBooked ? 'Sudah dipesan' : 'Klik untuk pesan'}">
                                ${slot}
                            </div>
                        `;
                    });

                    html += `
                            </div>
                            <div class="pricing-info">
                                <h5>Harga per jam:</h5>
                    `;

                    pricing.forEach(p => {
                        html += `<div class="price-row">
                            <span>${p.start_time.substring(0, 5)} - ${p.end_time.substring(0, 5)}</span>
                            <strong>Rp ${parseInt(p.price).toLocaleString('id-ID')}</strong>
                        </div>`;
                    });

                    html += `
                            </div>
                        </div>
                    `;
                });

                html += '</div>';
                scheduleContent.innerHTML = html;
            } catch (error) {
                console.error('Error loading schedule:', error);
                scheduleContent.innerHTML = '<div class="alert alert-error">Gagal memuat jadwal. Silakan coba lagi.</div>';
            }
        }

        function generateTimeSlots() {
            const slots = [];
            for (let i = 6; i < 24; i++) {
                slots.push(`${String(i).padStart(2, '0')}:00`);
            }
            return slots;
        }

        async function selectTimeSlot(courtId, time) {
            selectedCourt = courtId;
            selectedTime = time;
            selectedEndTime = String(parseInt(time) + 1).padStart(2, '0') + ':00';

            // Fetch WhatsApp admin
            try {
                const res = await fetch(`/api/whatsapp/${selectedVenue}`);
                const data = await res.json();
                whatsappAdmin = data.whatsapp;
            } catch (error) {
                console.error('Error fetching WhatsApp:', error);
            }

            // Tampilkan form
            document.getElementById('bookingForm').classList.add('active');
            
            // Update summary
            const court = document.querySelector(`[id="court-${courtId}"]`)?.parentElement?.querySelector('h4')?.textContent || 'Lapangan';
            document.getElementById('bookingSummary').textContent = 
                `${venueName} | ${court} | ${selectedDate} ${selectedTime}-${selectedEndTime}`;
        }

        function cancelBooking() {
            document.getElementById('bookingForm').classList.remove('active');
            selectedCourt = null;
            selectedTime = null;
        }

        function submitBooking() {
            const name = document.getElementById('customerName').value.trim();
            const phone = document.getElementById('customerPhone').value.trim();
            const notes = document.getElementById('notes').value.trim();

            if (!name) {
                alert('Nama harus diisi');
                return;
            }

            if (!phone) {
                alert('Nomor WhatsApp harus diisi');
                return;
            }

            // Format nomor WhatsApp
            let whatsappPhone = phone.replace(/\D/g, '');
            if (whatsappPhone.startsWith('0')) {
                whatsappPhone = '62' + whatsappPhone.substring(1);
            } else if (!whatsappPhone.startsWith('62')) {
                whatsappPhone = '62' + whatsappPhone;
            }

            // Buat pesan WhatsApp
            const message = encodeURIComponent(
                `Halo, saya ingin pesan lapangan futsal:\n\n` +
                `📍 Lokasi: ${venueName}\n` +
                `📅 Tanggal: ${selectedDate}\n` +
                `⏰ Jam: ${selectedTime} - ${selectedEndTime}\n` +
                `👤 Nama: ${name}\n` +
                `📞 WhatsApp: ${phone}\n` +
                `💬 Catatan: ${notes || '-'}\n\n` +
                `Terima kasih!`
            );

            // Redirect ke WhatsApp
            const whatsappUrl = `https://wa.me/${whatsappAdmin}?text=${message}`;
            window.open(whatsappUrl, '_blank');

            // Reset form
            document.getElementById('customerName').value = '';
            document.getElementById('customerPhone').value = '';
            document.getElementById('notes').value = '';
            document.getElementById('bookingForm').classList.remove('active');
        }

        // Load venues saat halaman dibuka
        window.addEventListener('load', loadVenues);
    </script>
</body>
</html>
